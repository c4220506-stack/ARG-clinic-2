<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ARG Clinic — Premium Dental Care</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f7f3ee;
    --warm-white: #fdfaf7;
    --sage: #8fa888;
    --deep-sage: #4a6348;
    --terracotta: #c4714f;
    --charcoal: #2a2724;
    --mid: #6b6460;
    --light-border: rgba(42,39,36,0.1);
    --gold: #c8a96e;
    --pale-green: #e6f2e8;
    --pale-green-2: #d6ebd9;
    --glass-bg: rgba(255,255,255,0.12);
    --glass-border: rgba(255,255,255,0.25);
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--warm-white);
    color: var(--charcoal);
    overflow-x: hidden;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--cream); }
  ::-webkit-scrollbar-thumb { background: var(--sage); border-radius: 10px; }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.3rem 5vw;
    background: rgba(253,250,247,0.85);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--light-border);
    transition: all 0.3s;
    animation: fadeDown .8s ease forwards;
  }
  nav.scrolled {
    padding: 0.9rem 5vw;
    background: rgba(253,250,247,0.97);
    box-shadow: 0 4px 30px rgba(42,39,36,0.08);
  }
  @keyframes fadeDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.7rem; font-weight: 600;
    letter-spacing: .06em; color: var(--charcoal);
    text-decoration: none;
  }
  .logo span { color: var(--deep-sage); font-style: italic; }
  .logo sub { font-size: .65rem; letter-spacing: .18em; vertical-align: middle; color: var(--mid); font-family: 'DM Sans', sans-serif; font-style: normal; font-weight: 300; margin-left: .3rem; }

  .nav-links { display: flex; gap: 2.4rem; list-style: none; align-items: center; }
  .nav-links a {
    text-decoration: none; font-size: .8rem; font-weight: 500;
    letter-spacing: .1em; text-transform: uppercase; color: var(--mid); transition: color .25s;
  }
  .nav-links a:hover { color: var(--charcoal); }
  .nav-cta {
    background: var(--deep-sage) !important; color: #fff !important;
    padding: .55rem 1.5rem; border-radius: 40px;
  }
  .nav-cta:hover { background: var(--charcoal) !important; }

  /* ══════════════════════════════════

    position: relative; width: 100%; height: 100vh;
